<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chart</title>
<style>html,body{margin:0;padding:0;height:100%;overflow:hidden}#tv{height:100%}</style>
</head>
<body>
<!-- Daily TradingView chart with MA(50) + MACD forced via the widget JS API.
     Linked from the MA Digest email (monitor/ma_digest.py in Backtesting-Pro):
     chart.html?symbol=NASDAQ%3AQQQ
     The widget's JS constructor honours study inputs (length: 50); the
     s.tradingview.com/widgetembed URL params do NOT — that's why this page exists. -->
<div id="tv"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  var symbol = new URLSearchParams(location.search).get("symbol") || "NASDAQ:QQQ";
  document.title = symbol + " — daily";
  new TradingView.widget({
    container_id: "tv",
    autosize: true,
    symbol: symbol,
    interval: "D",
    style: "1",                 // candlesticks
    theme: "light",
    timezone: "Australia/Sydney",
    withdateranges: true,
    hide_side_toolbar: false,
    allow_symbol_change: true,
    studies: [
      { id: "MASimple@tv-basicstudies", inputs: { length: 50 } },
      "MACD@tv-basicstudies"
    ]
  });
</script>
</body>
</html>
